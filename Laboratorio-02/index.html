<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador Mundial 2026</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->

    <header class="hero">

        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h1>⚽ Mundial 2026</h1>
            <p>Buscador y Comparador de Selecciones Nacionales</p>
        </div>

    </header>

    <!-- MAIN -->

    <main class="container">

        <section class="comparison-section">

            <!-- EQUIPO A -->

            <article class="team-panel">

                <h2>Equipo A</h2>

                <div class="search-container">

                    <input
                        type="text"
                        id="teamAInput"
                        placeholder="Buscar selección..."
                        autocomplete="off">

                    <div
                        id="teamADropdown"
                        class="suggestions-dropdown">
                    </div>

                </div>

                <div
                    id="teamAData"
                    class="team-card">

                    <div class="empty-state">
                        Selecciona un equipo para comenzar
                    </div>

                </div>

            </article>

            <!-- EQUIPO B -->

            <article class="team-panel">

                <h2>Equipo B</h2>

                <div class="search-container">

                    <input
                        type="text"
                        id="teamBInput"
                        placeholder="Buscar selección..."
                        autocomplete="off">

                    <div
                        id="teamBDropdown"
                        class="suggestions-dropdown">
                    </div>

                </div>

                <div
                    id="teamBData"
                    class="team-card">

                    <div class="empty-state">
                        Selecciona un equipo para comenzar
                    </div>

                </div>

            </article>

        </section>

    </main>

    <button id="tokenBtn" class="compare-btn" style="margin-bottom: 10%;">
        Borrar token
    </button>

    <!-- BOTÓN COMPARAR -->

    <button id="compareBtn" class="compare-btn">
        Comparar Equipos
    </button>

    <!-- MODAL 401 -->

    <div id="authModal" class="modal hidden">

        <div class="modal-content">

            <h2>Sesión Expirada</h2>

            <p>
                Tu token de autenticación ha expirado.
                Ingresa un nuevo token para continuar.
            </p>

            <input
                type="text"
                id="newToken"
                placeholder="Ingrese nuevo JWT">

            <button id="saveTokenBtn">
                Reautenticar
            </button>

        </div>

    </div>

    <script type="module" src="js/app.js"></script>

</body>

</html>
